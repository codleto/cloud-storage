services:
  postgres:
    image: postgres:16
    container_name: cloud-storage-postgres
    environment:
      POSTGRES_DB: cloud_storage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: cloud-storage-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: